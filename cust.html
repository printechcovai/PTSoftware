<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Management - Printech</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        * {
             margin: 0;
              padding: 0; 
              box-sizing: border-box; 
              font-family: tahoma, sans-serif; 
            }

        body {
             height: 100vh; 
             background: #ffffff; 
             background-image: url(bgdot.jpeg); 
             overflow: hidden; 
        }

        .sidebar { 
             width: 230px; 
             height: 100vh; 
             position: fixed; 
             left: 0; 
             top: 0; 
             background: #26bfa3;
             padding-top: 20px; 
             z-index: 100; 
        }

        .ptimg { 
             margin: 0 auto 30px auto; 
             width: 180px; 
             height: 80px;
             background: #ffffff; 
             border-radius: 15px; 
             display: flex;
             align-items: center;
             justify-content: center;
             box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .ptimg img { 
             width: 150px; 
        } 

        .sidebar a { 
            display: block; 
            padding: 12px 25px; 
            text-decoration: none; 
            color: white; 
            font-size: 16px; 
            transition: 0.3s;
            font-weight: 500;
        }

       .sidebar a:hover { 
           background: rgba(255, 255, 255, 0.2);
           padding-left: 35px; 
        }

       .sidebar button { 
           display: block; 
           width: 80%; 
           padding: 12px; 
           margin: 40px auto; 
           background: white; 
           color: #26bfa3; 
           font-weight: bold; 
           border-radius: 10px; 
           border: none; 
           cursor: pointer; 
           box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .main-area {
           margin-left: 230px; 
           height: 100vh; display: flex; 
           justify-content: center; 
           padding-top: 40px; 
           position: relative; 
        }

        .container { 
            width: 950px; 
            background: #ffffff; 
            padding: 40px; 
            box-shadow: 0 0 25px rgba(0,0,0,0.08); 
            border-radius: 12px; 
            z-index: 10; 
            overflow-y: auto; 
            max-height: 90vh; 
        }

        h2 { 
            display: inline-block;
            background: linear-gradient(to right, #07AFC0, #1aa853); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-size: 28px; 
            font-weight: bold; 
            margin-bottom: 30px; 
        }

        .row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 25px; 
            flex-wrap: wrap; 
        }

        .inputGroup { 
            width: 32%; 
            display: flex; 
            flex-direction: column; 
        }

        .inputGroup.half { 
            width: 48%; 
            margin-top: 15px; 
        }

        .inputGroup label { 
            font-size: 15px; 
            font-weight: bold; 
            color: #333; 
            margin-bottom: 8px; 
        }

        .inputGroup input, .inputGroup textarea { 
            border: none; 
            border-bottom: 3px solid #9de79d; 
            padding: 10px 5px; 
            font-size: 16px; 
            outline: none; 
            background: transparent; 
        }

        #placeOrderBtn { 
            padding: 12px 30px; 
            background: linear-gradient(to right, #07AFC0, #1aa853); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 20px; 
        }

        .orderRow { 
            background: #f5f4f4; 
            border-radius: 12px; 
            padding: 20px; 
            margin-top: 20px; 
            border-left: 6px solid #34c759; 
        }

        .calc-box { 
            display: flex; 
            justify-content: space-around; 
            background: #e8f5e9; 
            padding: 12px; 
            border-radius: 8px; 
            margin-top: 15px; 
            font-weight: bold; 
            font-size: 15px; 
        }

        .orderHeader { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
        }

        .action-columns { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            align-items: flex-end; 
        }

        .btn-group { 
            display: flex; 
            gap: 5px; 
            lign-items: center; 
        }

        .btn-act { 
            padding: 6px 12px; 
            border: none; 
            border-radius: 4px; 
            color: white; 
            font-size: 12px; 
            font-weight: bold; 
            cursor: pointer; }

        .btn-follow { 
            background: #007bff; 
        }

        .btn-delivery { 
            background: #2ecc71; 
        }

        .btn-edit { 
            background: #00bfff; 
        }

        .btn-paid { 
            background: #22c7a9; 
        }

        .btn-del { 
            background: #ff4d4d; 
        }

        .status-label { 
            font-size: 13px; 
            font-weight: bold; 
            padding: 4px 8px; 
            border-radius: 4px; 
        }

        .followed-text {
            color: #007bff; 
        }

        .delivered-text { 
            color: #2ecc71; 
        }

        .wave-container {
            position: fixed; 
            top: 0; 
            left: 230px; 
            width: calc(100% - 230px); 
            height: 100vh; 
            overflow: hidden; 
            z-index: 1; }

        .wave-container {
            position: fixed;
            top: 0;
            left: 230px;
            width: calc(100% - 230px);
            height: 100vh;
            overflow: hidden;
            z-index: -1;
        }

        .wave-track {
            position: absolute;
            bottom: 7%;
            display: flex;
            width: 200%;
            animation: waveMove 35s linear infinite;
        }
        .wave {
            width: 100%;
            height: auto;
            flex-shrink: 0;
        }

        @keyframes 
        waveMove {0% { transform: translateX(0); } 100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="ptimg"><img src="PTlogo.png"></div>
    <a href="home.html">Home</a>
    <a href="employees.html">Employees</a>
    <a href="attendance.html">Attendance</a>
    <a href="stock.html">Stock</a>
    <a href="cust.html">Customers</a>
    <a href="accounts.html">Accounts</a>
    <a href="expenses.html">Expenses</a>
    <a href="customer_data.html">Customer Data</a><br><br>
    <button onclick="logout()">Logout</button>
</div>
<div class="wave-container">
    <div class="wave-track">
        <img src="Software.png" class="wave">
        <img src="Software.png" class="wave">
    </div>
</div>

<div class="main-area">
    <div class="container">

        <h2>Customer Management</h2>
         <div class="row">
            <div class="inputGroup"><label>Customer Name</label><input type="text" id="custName"></div>
            <div class="inputGroup"><label>Mobile No</label><input type="text" id="mobileNo"></div>
            <div class="inputGroup"><label>Order No</label><input type="text" id="orderNo"></div>
        </div>

        <div class="row">
            <div class="inputGroup"><label>Total Amount</label><input type="number" id="totalAmt"></div>
          <div class="inputGroup"><label>Advance Paid</label><input type="number" id="advAmt"></div>
            <div class="inputGroup"><label>Deadline</label><input type="date" id="deadline"></div>
        </div>

        <div class="row">
            <div class="inputGroup half">
                <label>Type of Printing</label>
                <textarea id="printTypeInput" rows="2" placeholder="e.g. Offset, Screen..."></textarea>
            </div>

            <div class="inputGroup half">
                <label>Special Details</label>
                <textarea id="specialDetails" rows="2" placeholder="Any specific requirements..."></textarea>
            </div>
        </div>
        <button id="placeOrderBtn">Placed Order</button>
        <hr style="margin: 30px 0; opacity: 0.1;">
        <div id="ordersList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC3yLs6Zx_JuCtGIPVKSrY9gse3ZkAi3Fs",
        authDomain: "printech-c101a.firebaseapp.com",
        projectId: "printech-c101a",
        storageBucket: "printech-c101a.firebasestorage.app",
        messagingSenderId: "629188473697",
        appId: "1:629188473697:web:1ca8e7a5294eb9ec830b20"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.addEventListener("DOMContentLoaded", () => {
        let user = JSON.parse(sessionStorage.getItem("loggedUser"));
        if (!user) { window.location.href = "login.html"; return; }
        if (user.role !== "Founder" && user.role !== "Admin") {
            let empLink = document.querySelector("a[href='employees.html']");
            if (empLink) empLink.style.display = "none";
        }
    });

    const getLoggedUser = () => {
        return JSON.parse(sessionStorage.getItem("loggedUser")) || { username: "Guest", role: "Staff" };
    };

    document.getElementById("placeOrderBtn").onclick = async () => {
        const name = document.getElementById("custName").value.trim();
        const orderNo = document.getElementById("orderNo").value.trim();
        const total = parseFloat(document.getElementById("totalAmt").value) || 0;
        const adv = parseFloat(document.getElementById("advAmt").value) || 0;

        if(!name || !orderNo) return;

        const orderData = {
            name, orderNo, total, adv,
            type: document.getElementById("printTypeInput").value.trim(),
            details: document.getElementById("specialDetails").value.trim(),
            balance: total - adv,
            mobile: document.getElementById("mobileNo").value,
            deadline: document.getElementById("deadline").value,
            orderDate: new Date().toLocaleDateString('en-GB'),
            isDelivered: false,
            followedBy: "",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection("SoftwareData").doc(orderNo).set(orderData);
            document.getElementById("custName").value = "";
            document.getElementById("orderNo").value = "";
            document.getElementById("totalAmt").value = "";
            document.getElementById("advAmt").value = "";
            document.getElementById("mobileNo").value = "";
            document.getElementById("printTypeInput").value = "";
            document.getElementById("specialDetails").value = "";
        } catch(e) { console.error(e.message); }
    };

    db.collection("SoftwareData").orderBy("timestamp", "desc").onSnapshot(snap => {
        const container = document.getElementById("ordersList");
        const currentUser = getLoggedUser();
        container.innerHTML = "";
        
        snap.forEach(docSnap => {
            const o = docSnap.data();
            const id = docSnap.id;

            let followUI = o.followedBy 
                ? `<span class="status-label followed-text">${currentUser.role === "Founder" ? 'Followed: '+o.followedBy : 'Followed ✅'}</span>`
                : `<button class="btn-act btn-follow" onclick="followOrder('${id}')">Follow</button>`;

            const deliveryUI = o.isDelivered
                ? `<span class="status-label delivered-text">Delivered ✅</span>`
                : `<button class="btn-act btn-delivery" onclick="markDelivered('${id}')">Delivery</button>`;

            container.innerHTML += `
                <div class="orderRow">
                    <div class="orderHeader">
                        <div>
                            <b style="font-size:18px;">#${o.orderNo} - ${o.name}</b><br>
                            <small>📱 ${o.mobile || 'No Mobile'}</small><br>
                            <small>📅 <b>Order:</b> ${o.orderDate || 'N/A'} | ⏳ <b>Deadline:</b> ${o.deadline}</small>
                        </div>
                        <div class="action-columns">
                            <div class="btn-group">${followUI}${deliveryUI}</div>
                            <div class="btn-group">
                                <button class="btn-act btn-edit" onclick="editOrder('${id}', ${o.total}, ${o.adv})">Edit</button>
                                <button class="btn-act btn-paid" onclick="markAsPaid('${id}')">Paid ✅</button>
                                <button class="btn-act btn-del" onclick="deleteOrder('${id}')">Del</button>
                            </div>
                        </div>
                    </div>
                    <p style="margin-top:10px;"><b>Printing:</b> ${o.type || 'N/A'}</p>
                    <p style="color:#666; font-size:14px; margin-top:5px;"><b>Special Details:</b> ${o.details || 'None'}</p>
                    <div class="calc-box">
                        <span>Total: ₹${o.total}</span>
                        <span style="color:blue;">Adv: ₹${o.adv}</span>
                        <span style="color:${o.balance > 0 ? 'red' : 'green'};">Pending: ₹${o.balance}</span>
                    </div>
                </div>`;
        });
    });

    window.followOrder = async (id) => {
        const uName = getLoggedUser().username || "Staff";
        await db.collection("SoftwareData").doc(id).update({ followedBy: uName });
    };

    window.markDelivered = async (id) => {
        const dDate = new Date().toLocaleDateString('en-GB');
        await db.collection("SoftwareData").doc(id).update({ isDelivered: true, deliveryDate: dDate });
    };

    window.markAsPaid = async (id) => {
        try {
            const docRef = db.collection("SoftwareData").doc(id);
            const docSnap = await docRef.get();

            if (docSnap.exists) {
                const data = docSnap.data();
                await db.collection("DeliveredOrders").add({
                    orderNo: data.orderNo || id,
                    name: data.name || "N/A",
                    mobile: data.mobile || "-",
                    type: data.type || "-",
                    total: parseFloat(data.total) || 0,
                    details: data.details || "None",
                    status: "PAID",
                    deliveredAt: new Date().toLocaleDateString('en-GB'),
                    movedTimestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                await docRef.delete();
            }
        } catch(e) { console.error(e); }
    };

    window.deleteOrder = async (id) => { 
        if(confirm("Confirm Delete? This cannot be undone! 🗑️")) {
            await db.collection("SoftwareData").doc(id).delete(); 
        }
    };

    window.editOrder = async (id, t, a) => {
        const nt = prompt("New Total Amount:", t);
        const na = prompt("New Advance Paid:", a);
        if(nt !== null && na !== null) {
            const total = parseFloat(nt);
            const adv = parseFloat(na);
            await db.collection("SoftwareData").doc(id).update({ total, adv, balance: total - adv });
        }
    };

    window.logout = () => {
        sessionStorage.clear();
        window.location.href = "login.html";
    };
</script>
</body>
</html>

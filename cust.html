<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Management - Printech</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: tahoma, sans-serif; }
        body { height: 100vh; background: #ffffff; background-image: url(bgdot.jpeg); overflow: hidden; }

        .sidebar { 
            width: 230px; height: 100vh; position: fixed; left: 0; top: 0; 
            background: linear-gradient(#34caca, #1aa853); padding-top: 30px; 
            box-shadow: 0 0 15px rgba(0,0,0,0.15); z-index: 100; 
        }
        .ptimg { margin-left: 30px; width: 70%; border-radius: 12px; background: #ffffff; padding: 10px; text-align: center; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        .ptimg img { width: 120px; }
        .sidebar a { display: block; padding: 12px 20px; margin: 10px 15px; text-decoration: none; color: white; font-size: 16px; border-radius: 20px; transition: 0.3s; }
        .sidebar a:hover { background: rgba(255,255,255,0.3); }
        .sidebar button { display: block; width: 80%; padding: 12px; margin: 40px auto; background: white; color: #26bfa3; font-weight: bold; border-radius: 30px; border: none; cursor: pointer; }

        .main-area { margin-left: 230px; height: 100vh; display: flex; justify-content: center; padding-top: 40px; position: relative; }
        .container { width: 950px; background: #ffffff; padding: 40px; box-shadow: 0 0 25px rgba(0,0,0,0.08); border-radius: 12px; z-index: 10; overflow-y: auto; max-height: 90vh; }
        
        h2 { background: linear-gradient(to right, #07AFC0, #1aa853); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 28px; font-weight: bold; margin-bottom: 30px; }

        .row { display: flex; justify-content: space-between; margin-bottom: 25px; flex-wrap: wrap; }
        .inputGroup { width: 32%; display: flex; flex-direction: column; }
        .inputGroup.half { width: 48%; margin-top: 15px; }
        .inputGroup label { font-size: 15px; font-weight: bold; color: #333; margin-bottom: 8px; }
        .inputGroup input, .inputGroup textarea { border: none; border-bottom: 3px solid #9de79d; padding: 10px 5px; font-size: 16px; outline: none; background: transparent; }

        #placeOrderBtn { padding: 12px 30px; background: linear-gradient(to right, #07AFC0, #1aa853); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 20px; }

        .orderRow { background: #f5f4f4; border-radius: 12px; padding: 20px; margin-top: 20px; border-left: 6px solid #34c759; }
        .calc-box { display: flex; justify-content: space-around; background: #e8f5e9; padding: 12px; border-radius: 8px; margin-top: 15px; font-weight: bold; font-size: 15px; }
        
        .orderHeader { display: flex; justify-content: space-between; align-items: flex-start; }
        .action-columns { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .btn-group { display: flex; gap: 5px; align-items: center; }

        .btn-act { padding: 6px 12px; border: none; border-radius: 4px; color: white; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-follow { background: #007bff; } /* Blue color for follow */
        .btn-delivery { background: #2ecc71; }
        .btn-edit { background: #00bfff; }
        .btn-paid { background: #22c7a9; }
        .btn-del { background: #ff4d4d; }

        .status-label { font-size: 13px; font-weight: bold; padding: 4px 8px; border-radius: 4px; }
        .followed-text { color: #007bff; }
        .delivered-text { color: #2ecc71; }

        .wave-container { position: fixed; top: 0; left: 230px; width: calc(100% - 230px); height: 100vh; overflow: hidden; z-index: 1; }
        .wave-track { position: absolute; bottom: 5%; display: flex; width: 200%; animation: waveMove 35s linear infinite; opacity: 0.5; }
        .wave { width: 100%; height: auto; flex-shrink: 0; }
        @keyframes waveMove { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="ptimg"><img src="PTlogo.png"></div><br>
    <a href="home.html">Home</a>
    <a href="employees.html">Employees</a>
    <a href="attendance.html">Attendance</a>
    <a href="stock.html">Stock</a>
    <a href="cust.html">Customers</a>
    <a href="accounts.html">Accounts</a>
    <a href="expenses.html">Expenses</a><br><br>
    <button onclick="logout()">Logout</button>
</div>

<div class="wave-container">
    <div class="wave-track">
        <img src="Software.png" class="wave">
        <img src="Software.png" class="wave">
    </div>
</div>

<div class="main-area">
    <div class="container">
        <h2>Customer Management</h2>
        
        <div class="row">
            <div class="inputGroup"><label>Customer Name</label><input type="text" id="custName"></div>
            <div class="inputGroup"><label>Mobile No</label><input type="text" id="mobileNo"></div>
            <div class="inputGroup"><label>Order No</label><input type="text" id="orderNo"></div>
        </div>

        <div class="row">
            <div class="inputGroup"><label>Total Amount</label><input type="number" id="totalAmt"></div>
            <div class="inputGroup"><label>Advance Paid</label><input type="number" id="advAmt"></div>
            <div class="inputGroup"><label>Deadline</label><input type="date" id="deadline"></div>
        </div>

        <div class="row">
            <div class="inputGroup half">
                <label>Type of Printing</label>
                <textarea id="printTypeInput" rows="2" placeholder="e.g. Offset, Screen..."></textarea>
            </div>
            <div class="inputGroup half">
                <label>Special Details</label>
                <textarea id="specialDetails" rows="2" placeholder="Any specific requirements..."></textarea>
            </div>
        </div>

        <button id="placeOrderBtn">Placed Order</button>
        <hr style="margin: 30px 0; opacity: 0.1;">
        <div id="ordersList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC3yLs6Zx_JuCtGIPVKSrY9gse3ZkAi3Fs",
        authDomain: "printech-c101a.firebaseapp.com",
        projectId: "printech-c101a",
        storageBucket: "printech-c101a.firebasestorage.app",
        messagingSenderId: "629188473697",
        appId: "1:629188473697:web:1ca8e7a5294eb9ec830b20"
    };
document.addEventListener("DOMContentLoaded", () => {
    let user = JSON.parse(sessionStorage.getItem("loggedUser"));
    if (!user) { window.location.href = "login.html"; return; }
    if (user.role !== "Founder" && user.role !== "Admin") {
        let empLink = document.querySelector("a[href='employees.html']");
        if (empLink) empLink.style.display = "none";
    }
  });
window.addEventListener('DOMContentLoaded', () => {
    // 1. Session-la irundhu user data-va edu
    const loggedUser = JSON.parse(sessionStorage.getItem("loggedUser"));
    
    if (loggedUser) {
      // 2. Role "Founder" illana Accounts & Expenses-ah maraichidu
      if (loggedUser.role !== "Founder") {
        // Sidebar-la irukkura Accounts & Expenses links-ah 'id' vechu kandupidi
        const accLink = document.querySelector('a[href="employees.html"]');
        
        
        if (accLink) accLink.style.display = 'none';
        if (expLink) expLink.style.display = 'none';
      } 
        } else {
      // Login pannala-na veliya thallu
      window.location.href = "login.html";
    }
  });

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const getLoggedUser = () => {
        const user = JSON.parse(sessionStorage.getItem("loggedUser"));
        // Username dhaan edukkarom (Employee name venda)
        return user ? (user.username || user.name || "Staff") : "Guest";
    };

    // --- Add Order ---
    document.getElementById("placeOrderBtn").onclick = async () => {
        const name = document.getElementById("custName").value.trim();
        const orderNo = document.getElementById("orderNo").value.trim();
        const total = parseFloat(document.getElementById("totalAmt").value) || 0;
        const adv = parseFloat(document.getElementById("advAmt").value) || 0;

        if(!name || !orderNo) return alert("Customer Name and Order No are important!");

        const orderData = {
            name, orderNo, total, adv,
            type: document.getElementById("printTypeInput").value.trim(),
            details: document.getElementById("specialDetails").value.trim(),
            balance: total - adv,
            mobile: document.getElementById("mobileNo").value,
            deadline: document.getElementById("deadline").value,
            isDelivered: false,
            followedBy: "",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection("SoftwareData").doc(orderNo).set(orderData);
            alert("Order " + orderNo + " Placed! ✅");
            location.reload();
        } catch(e) { alert(e.message); }
    };

    // --- List Display ---
    db.collection("SoftwareData").orderBy("timestamp", "desc").onSnapshot(snap => {
        const container = document.getElementById("ordersList");
        container.innerHTML = "";
        snap.forEach(docSnap => {
            const o = docSnap.data();
            const id = docSnap.id;

            // Follow UI Logic
            const followUI = o.followedBy 
                ? `<span class="status-label followed-text">Followed: ${o.followedBy}</span>` 
                : `<button class="btn-act btn-follow" onclick="followOrder('${id}')">Follow</button>`;

            // Delivery UI Logic
            const deliveryUI = o.isDelivered 
                ? `<span class="status-label delivered-text">Delivered ✅</span>` 
                : `<button class="btn-act btn-delivery" onclick="markDelivered('${id}')">Delivery</button>`;

            container.innerHTML += `
                <div class="orderRow">
                    <div class="orderHeader">
                        <div>
                            <b style="font-size:18px;">#${o.orderNo} - ${o.name}</b><br>
                            <small>📱 ${o.mobile || 'No Mobile'} | 📅 Deadline: ${o.deadline}</small>
                        </div>
                        <div class="action-columns">
                            <div class="btn-group">
                                ${followUI}
                                ${deliveryUI}
                            </div>
                            <div class="btn-group">
                                <button class="btn-act btn-edit" onclick="editOrder('${id}', ${o.total}, ${o.adv})">Edit</button>
                                <button class="btn-act btn-paid" onclick="markAsPaid('${id}', ${o.total})">Paid ✅</button>
                                <button class="btn-act btn-del" onclick="deleteOrder('${id}')">Del</button>
                            </div>
                        </div>
                    </div>
                    <p style="margin-top:10px;"><b>Printing:</b> ${o.type || 'N/A'}</p>
                    <p style="color:#666; font-size:14px; margin-top:5px;"><b>Special Details:</b> ${o.details || 'None'}</p>
                    <div class="calc-box">
                        <span>Total: ₹${o.total}</span>
                        <span style="color:blue;">Adv: ₹${o.adv}</span>
                        <span style="color:${o.balance > 0 ? 'red' : 'green'};">Pending: ₹${o.balance}</span>
                    </div>
                </div>`;
        });
    });

    // --- Functions ---
    window.followOrder = async (id) => {
        const user = getLoggedUser();
        if(confirm("Follow this order?")) {
            await db.collection("SoftwareData").doc(id).update({ followedBy: user });
        }
    };

    window.markDelivered = async (id) => {
        if(confirm("Confirm Delivery?")) {
            await db.collection("SoftwareData").doc(id).update({ isDelivered: true });
        }
    };

    window.markAsPaid = async (id, totalAmt) => {
        if(confirm("Confirm full payment?")) {
            await db.collection("SoftwareData").doc(id).update({ adv: totalAmt, balance: 0 });
        }
    };

    window.editOrder = async (id, t, a) => {
        const nt = prompt("New Total Amount:", t);
        const na = prompt("New Advance Paid:", a);
        if(nt !== null && na !== null) {
            const total = parseFloat(nt);
            const adv = parseFloat(na);
            await db.collection("SoftwareData").doc(id).update({ total, adv, balance: total - adv });
        }
    };

    window.deleteOrder = async (id) => { if(confirm("Delete this order?")) await db.collection("SoftwareData").doc(id).delete(); };
    window.logout = () => { sessionStorage.clear(); window.location.href="login.html"; };


</script>
</body>
</html>

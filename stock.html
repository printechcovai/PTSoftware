.ptimg {

    justify-content: center;

.sidebar a {

    font-size: 16px; 
    transition: 0.3s;
    font-weight: 500;
}

.sidebar a:hover {

}

.sidebar button { 
    display: block; 
    width: 80%; 
    padding: 12px; 
    margin: 40px auto; 
    background: white; 
    color: #26bfa3; 
    font-weight: bold; 
    border-radius: 10px; 
    border: none; 
    cursor: pointer; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.main-content {
  margin-left: 230px;
  height: 100vh;              
  padding: 25px;
  overflow: hidden;           
  display: flex;
  justify-content: center;
  align-items: flex-start;   
}



* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}


.wave-container {
  position: fixed;
  top: 0;
  left: 230px;
  width: calc(100% - 230px);
  height: 100vh;
  overflow: hidden;
  z-index: -1;
}

.wave-track {
  position: absolute;
  bottom: 7%;
  display: flex;
  width: 200%;
  animation: waveMove 35s linear infinite;
}

.wave {
  width: 100%;
  height: auto;
  flex-shrink: 0;
}

@keyframes waveMove {
  0% {
    transform: translateX(0);
  }
  100% {
    transform: translateX(-50%);
  }
}

#available,
#required{
  width: 100px;     
  padding: 6px;

}


.followedUnder {

}
.item small-box {

}
.item span.qty {
  display: inline-block;
  min-width: 70px;
  padding: 3px 6px;
  background: #eaeaea;
  border-radius: 5px;
  font-size: 13px;
}
.qty-line {
  font-size: 13px;  
  color: #444;
}

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, deleteDoc, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC3yLs6Zx_JuCtGIPVKSrY9gse3ZkAi3Fs",
    authDomain: "printech-c101a.firebaseapp.com",
    projectId: "printech-c101a",
    storageBucket: "printech-c101a.firebasestorage.app",
    messagingSenderId: "629188473697",
    appId: "1:629188473697:web:1ca8e7a5294eb9ec830b20"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const stockCol = collection(db, "StockData");

  const getLoggedUser = () => JSON.parse(sessionStorage.getItem("loggedUser"));
  const getUsername = () => {
    const user = getLoggedUser();
    return user ? (user.user || user.name) : "Admin";
  };

  // Sidebar Role Logic
  window.addEventListener('DOMContentLoaded', () => {
    const user = getLoggedUser();
    if (user && user.role !== "Founder") {
      const empLink = document.getElementById("empLink");
      if (empLink) empLink.style.display = 'none';
    }
  });

  window.setItemName = (sel) => {
    if (sel.value !== "") {
      document.getElementById("itemName").value = sel.options[0].text + " : " + sel.value;
      document.querySelectorAll("select").forEach(s => { if (s !== sel) s.value = ""; });
    }
  };

  window.saveStock = async () => {
    const name = document.getElementById("itemName").value;
    const from = document.getElementById("fromShop").value;
    const req = document.getElementById("required").value;
    if (!name || !from || !req) return alert("Machi, details fill pannu!");

    try {
      const now = new Date();
      await addDoc(stockCol, {
        item: name, fromShop: from, req: parseInt(req),
        addedBy: getUsername(), followedBy: "", done: false,
        dateTime: now.toLocaleString('en-GB'), timestamp: now
      });
      alert("Order Placed! 📦");
      document.getElementById("itemName").value = "";
      document.getElementById("fromShop").value = "";
      document.getElementById("required").value = "";
    } catch (e) { alert("Error: " + e.message); }
  };

  window.followStock = async (id) => { 
    await updateDoc(doc(db, "StockData", id), { followedBy: getUsername() }); 
  };

  window.markAsDone = async (id, itemName, shopName) => {
    const amt = document.getElementById(`amt-${id}`).value;
    if (!amt || amt <= 0) return alert("Amount enter pannu machi!");

    try {
      const now = new Date();
      // 1. Mark as Done
      await updateDoc(doc(db, "StockData", id), { done: true });
      // 2. Send to Expenses with Shop Name from Stock
      await setDoc(doc(db, "ExpensesData", `Stock-${Date.now()}`), {
        shop: shopName, // Inga dhaan 'From' shop name vizhum
        item: itemName,
        amount: Number(amt),
        date: now.toLocaleDateString('en-GB'),
        rawDate: now.toISOString().split('T')[0],
        addedBy: getUsername(),
        isPaid: false,
        timestamp: now
      });
      alert("Done! Added to Expenses. 💸");
    } catch (e) { alert("Error!"); }
  };

  window.deleteStock = async (id) => { if (confirm("Delete panna va?")) await deleteDoc(doc(db, "StockData", id)); };

  onSnapshot(query(stockCol, orderBy("timestamp", "desc")), (snap) => {
    const listDiv = document.getElementById("list");
    listDiv.innerHTML = "";
    snap.forEach(docSnap => {
      const s = docSnap.data();
      const id = docSnap.id;
      const safeItem = s.item.replace(/'/g, "\\'");
      const safeShop = (s.fromShop || "Unknown").replace(/'/g, "\\'");

      let statusCol = s.done ? "#28a745" : (s.followedBy ? "#11a9cf" : "#ff4444");

      listDiv.innerHTML += `
        <div class="stock-card" style="border-left: 10px solid ${statusCol}; background:#f9f9f9; padding:15px; border-radius:10px; margin-bottom:10px; display:grid; grid-template-columns: 2fr 1fr 1.5fr; align-items:center;">
          <div>
            <h4 style="margin:0; color:#333;">${s.item}</h4>
            <p style="margin:5px 0; font-size:13px; color:#666;">From: <b>${s.fromShop}</b> | Qty: <b>${s.req}</b></p>
            <small style="color:#999;">By: ${s.addedBy}</small>
          </div>
          <div style="text-align:center;">
            ${s.done ? '<b style="color:#28a745;">✓ DONE</b>' : (s.followedBy ? '<b style="color:#11a9cf;">In Progress</b>' : '<b style="color:#ff4444;">Pending</b>')}
          </div>
          <div style="text-align:right; display:flex; gap:5px; justify-content:flex-end; align-items:center;">
            ${!s.done && !s.followedBy ? `<button onclick="followStock('${id}')" style="background:#11a9cf; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;">Follow</button>` : ''}
            
            ${!s.done && s.followedBy ? `
              <input type="number" id="amt-${id}" placeholder="₹ Amt" style="width:70px; padding:7px; border:1px solid #ccc; border-radius:5px;">
              <button onclick="markAsDone('${id}', '${safeItem}', '${safeShop}')" style="background:#82cd00; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;">Done</button>
            ` : ''}
            
            <button onclick="deleteStock('${id}')" style="background:#ff4444; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;">Del</button>
          </div>
        </div>`;
    });
  });

  window.logout = () => { sessionStorage.clear(); window.location.href = "login.html"; };
</script>

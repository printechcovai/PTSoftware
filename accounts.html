<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<meta charset="UTF-8">
<title>Accounts</title>

<style>
  html, body {
  height: 100%;
  margin: 0;
  overflow-x: hidden; 
  font-family: Tahoma, sans-serif;
  background-image: url(bgdot.jpeg);
}
.container {
  position: relative;
  width: 900px;
  max-height: calc(100vh - 60px);
  background: #ffffff;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(0,0,0,0.08);
  z-index: 1;
  overflow-y: auto;  
}

.container h2 {
    display: inline-block;
    background: linear-gradient(to right, #07AFC0, #1aa853);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 28px;
    margin-bottom: 30px;
    font-weight: bold;
    
}
    h1 {
        margin-left: 5%;
        color: #67B200;
    }

    .form-box {
        background: #fff;
        width: 100%;
       margin-top: 20PX auto;
       margin-left: 10px;
        padding: 25px;
        border-radius: 12px;

    }

    .form-row {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
    }

    .form-row input {
        flex: 1;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 15px;
    }

    button {
        padding: 12px 20px;
        margin-top: 8px;
        background: linear-gradient(to right, #07AFC0, #1aa853);
        color: white;
        border: none;
        font-size: 15px;
        cursor: pointer;
        border-radius: 6px;
    }

    .container button:hover {
        background: linear-gradient(to right,#1aa853, #07AFC0);
    }
    table {
        width: 100%;
        margin-top: 30PX;
        background: white;
        border-collapse: collapse;
       
    }

    th {
        background: #f4f4f4;
        padding: 14px;
        color: #080808;
        text-align: left;
    }

    td {
        padding: 14px;
        border-bottom: 1px solid #ddd;
    }

    .actions {
        display: flex;
        gap: 10px;
    }

    .btn-edit {
        padding: 6px 12px;
        background: #2196f3;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .btn-del {
        padding: 6px 12px;
        background: #e53935;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

 .sidebar { 
    width: 230px; 
    height: 100vh; 
    position: fixed; 
    left: 0; 
    top: 0; 
    background: #26bfa3; 
    padding-top: 20px; 
    z-index: 100; 
}

.ptimg { 
    margin: 0 auto 30px auto; 
    width: 180px; 
    height: 80px;
    background: #ffffff; 
    border-radius: 15px; 
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.ptimg img { 
    width: 150px; 
}

.sidebar a { 
    display: block; 
    padding: 12px 25px; 
    text-decoration: none; 
    color: white; 
    font-size: 16px; 
    transition: 0.3s;
    font-weight: 500;
}

.sidebar a:hover { 
    background: rgba(255, 255, 255, 0.2);
    padding-left: 35px; 
}

.sidebar button { 
    display: block; 
    width: 80%; 
    padding: 12px; 
    margin: 40px auto; 
    background: white; 
    color: #26bfa3; 
    font-weight: bold; 
    border-radius: 10px; 
    border: none; 
    cursor: pointer; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

.page-wrap {
  margin-left: 230px;
  width: calc(100% - 230px);
  height: 100vh;
  display: flex;
  justify-content: center;
  padding: 30px 0;
  overflow: hidden;   
}

.wave-container {
  position: fixed;
  top: 0;
  left: 230px;
  width: calc(100% - 230px);
  height: 100vh;
  overflow: hidden;
  z-index: 0;         
  pointer-events: none;
}


.wave-track {
  position: absolute;
  bottom: 7%;
  display: flex;
  width: 200%;
  animation: waveMove 35s linear infinite;
  
}

.wave {
  width: 100%;
  height: auto;
  flex-shrink: 0;
}

@keyframes waveMove {
  0% {
    transform: translateX(0);
  }
  100% {
    transform: translateX(-50%);
  }
}


table td {
    font-size: 14px;
}

</style></head>
<body>
    <div class="wave-container">
  <div class="wave-track">
    <img src="Software.png" class="wave">
    <img src="Software.png" class="wave">
  </div>
</div>
    <div class="sidebar">
    <div class="ptimg">
        <img src="PTlogo.png" alt="Printech Logo">
    </div>
    <a href="home.html">Home</a>
    <a href="employees.html" id="empLink">Employees</a>
    <a href="attendance.html">Attendance</a>
    <a href="stock.html">Stock</a>
    <a href="cust.html">Customers</a>
    <a href="accounts.html">Accounts</a>
    <a href="expenses.html">Expenses</a>
    <a href="customer_data.html">Customer Data</a><br><br><br><br>
    
    <button onclick="logout()">Logout</button>
</div>
<div class="page-wrap">
<div class="container">

<h2>Accounts</h2>
<div class="form-box">

    <div class="form-row">
        <input type="text" id="agent" placeholder="Agent Name">
        <input type="text" id="job" placeholder="Job Detail">
    </div>

    <div class="form-row">
        <input type="number" id="amount" placeholder="Total Amount (Rs.)">
        <input type="text" id="mobile" placeholder="Mobile Number">
    </div>

    <button onclick="saveAccount()">Save</button>
<table>
    <thead>
        <tr>
            <th>Agent</th>
            <th>Job</th>
            <th>Total Amount</th>
            <th>Mobile Number</th>
<th>Added By</th>
<th>Actions</th>

        </tr>
    </thead>

    <tbody id="accTable"></tbody>
</table><br>
<button onclick="exportAccounts()" style="background: #1aa853; margin-left: 10px;">📥 Export Accounts</button>
</div>
</div>

<div class="row" style="margin-bottom: 20px;">
    <div class="inputGroup" style="width: 100%;">
        <input type="text" id="searchInput" placeholder="Search Customer Name..." onkeyup="searchOrders()" style="border-bottom: 3px solid #07AFC0;">
    </div>
</div>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, onSnapshot, query, deleteDoc, orderBy, getDoc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC3yLs6Zx_JuCtGIPVKSrY9gse3ZkAi3Fs",
    authDomain: "printech-c101a.firebaseapp.com",
    projectId: "printech-c101a",
    storageBucket: "printech-c101a.firebasestorage.app",
    messagingSenderId: "629188473697",
    appId: "1:629188473697:web:1ca8e7a5294eb9ec830b20"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const accCol = collection(db, "AccountsData");

  let currentEditId = null;

  const getLoggedUser = () => {
    const user = JSON.parse(sessionStorage.getItem("loggedUser"));
    return user ? (user.user || user.name) : "Unknown";
  };

  window.exportAccounts = async () => {
    try {
        const snap = await getDocs(query(accCol, orderBy("timestamp", "desc")));
        if (snap.empty) return alert(" Accounts data's is empty!");

        let csvContent = "Agent Name,Job Detail,Amount,Mobile,Added By,Followed By,Done By,Status\n";
        
        snap.forEach(docSnap => {
            const d = docSnap.data();
            let status = d.isDone ? "Completed" : (d.followBy ? "In Progress" : "Pending");
            csvContent += `"${d.agent}","${d.job}","${d.amount}","${d.mobile}","${d.addedBy}","${d.followBy || ''}","${d.doneBy || ''}","${status}"\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `Printech_Accounts_Report.csv`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        alert("Account Report Exported! ✅");
    } catch (e) { alert("Export Error: " + e.message); }
  };

  window.saveAccount = async () => {
    const a = document.getElementById("agent").value.trim();
    const j = document.getElementById("job").value.trim();
    const amt = document.getElementById("amount").value.trim();
    const mob = document.getElementById("mobile").value.trim();

    if (!a || !j || !amt || !mob) return alert("Fill all details!");

    try {
      const docId = currentEditId ? currentEditId : (a + "_" + Date.now());
      const accData = {
        agent: a, job: j, amount: Number(amt), mobile: mob,
        addedBy: getLoggedUser(), timestamp: new Date()
      };

      if(!currentEditId) {
        accData.followBy = ""; accData.doneBy = ""; accData.isDone = false;
      }

      await setDoc(doc(db, "AccountsData", docId), accData, { merge: true });
      alert(currentEditId ? "Updated! ✅" : "Saved! ✅");
      clearForm();
    } catch (e) { alert("Error: " + e.message); }
  };

  window.updateAccountStatus = async (id, data) => { await updateDoc(doc(db, "AccountsData", id), data); };
  window.deleteAcc = async (id) => { if (confirm("Are you sure Do you want delete?")) await deleteDoc(doc(db, "AccountsData", id)); };
  window.editAcc = async (id) => {
    const docSnap = await getDoc(doc(db, "AccountsData", id));
    if (docSnap.exists()) {
      const d = docSnap.data();
      document.getElementById("agent").value = d.agent;
      document.getElementById("job").value = d.job;
      document.getElementById("amount").value = d.amount;
      document.getElementById("mobile").value = d.mobile;
      currentEditId = id;
      document.querySelector(".form-box button").innerText = "Update Account";
    }
  };
  window.logout = () => { sessionStorage.clear(); window.location.href = "login.html"; };

  function clearForm() {
    document.getElementById("agent").value = "";
    document.getElementById("job").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("mobile").value = "";
    currentEditId = null;
    document.querySelector(".form-box button").innerText = "Save";
  }

  onSnapshot(query(accCol, orderBy("timestamp", "desc")), (snap) => {
    const accTable = document.getElementById("accTable");
    accTable.innerHTML = "";
    snap.forEach((docSnap) => {
      const d = docSnap.data();
      const id = docSnap.id;
      const currentUser = getLoggedUser();

      let followText = d.followBy ? `<span style="color:#07AFC0; font-size:12px;">👤 ${d.followBy}</span>` : 
                       `<button onclick="updateAccountStatus('${id}', {followBy: '${currentUser}'})" style="background:#07AFC0; color:white; padding:6px; font-size:10px; border:none; border-radius:4px; cursor:pointer;">Follow</button>`;
      
      let doneText = d.isDone ? `<span style="color:#1aa853; font-size:12px;">✅ ${d.doneBy}</span>` : 
                     `<button onclick="updateAccountStatus('${id}', {isDone: true, doneBy: '${currentUser}'})" style="background:#1aa853; color:white; padding:6px; font-size:10px; border:none; border-radius:4px; cursor:pointer;">Done</button>`;

      accTable.innerHTML += `
        <tr style="${d.isDone ? 'background-color: #f0fff0;' : ''}">
          <td style="color: blue; cursor: pointer; font-weight: bold;" onclick="editAcc('${id}')">${d.agent}</td>
          <td>${d.job}</td>
          <td>Rs. ${d.amount}</td>
          <td>${d.mobile}</td>
          <td>${d.addedBy}</td>
          <td>
            <div style="display: flex; gap: 5px;">
              ${followText} ${doneText}
              <button onclick="deleteAcc('${id}')" style="background:#ff4d4d; color:white; border:none; padding:6px; font-size:10px; border-radius:4px; cursor:pointer;">Del</button>
            </div>
          </td>
        </tr>`;
    });
  });
  window.addEventListener('DOMContentLoaded', () => {
  
    const loggedUser = JSON.parse(sessionStorage.getItem("loggedUser"));
    
    if (loggedUser) {
      if (loggedUser.role !== "Founder") {
        const accLink = document.querySelector('a[href="employees.html"]');
      
        if (accLink) accLink.style.display = 'none';
        if (expLink) expLink.style.display = 'none';
      }
    } else {
      window.location.href = "login.html";
    }
  });

  window.markDelivered = async (id) => {
        if(confirm("Confirm Delivery? Data will move to Customer Data page.")) {
            try {
                const docRef = db.collection("SoftwareData").doc(id);
                const doc = await docRef.get();
                if (doc.exists) {
                    
                    await db.collection("DeliveredOrders").doc(id).set({
                        ...doc.data(),
                        isDelivered: true,
                        deliveredAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    await docRef.delete();
                    alert("Order Moved to Customer Data! ✅");
                }
            } catch(e) { alert(e.message); }
        }
    };

    function searchOrders() {
        let filter = document.getElementById("searchInput").value.toUpperCase();
        let rows = document.getElementsByClassName("orderRow");
        for (let i = 0; i < rows.length; i++) {
            let name = rows[i].getElementsByTagName("b")[0].innerText;
            if (name.toUpperCase().indexOf(filter) > -1) {
                rows[i].style.display = "";
            } else {
                rows[i].style.display = "none";
            }
        }
    }
</script>
</body>
</html>

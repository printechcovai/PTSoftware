<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<meta charset="UTF-8">
<title>Home page</title>
<style>

    body {
    margin: 0;
    font-family: 'Times New Roman', Times, serif;
    background: url('bgdot.png') repeat; 
    }

.wave-container {
    position: fixed;
    top: 0;
    left: 230px;
    width: calc(100% - 230px);
    height: 100vh;
    overflow: hidden;
    z-index: 0; 
    pointer-events: none; 
}

.content {
    margin-left: 230px;
    width: calc(100% - 230px);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 1; 
}



.home-box {
    width: 100%;
    display: flex;
    justify-content: center;
}
  .card {
    width: 420px;
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.15);
    margin: 0 !important;  
}

.card h2 {
    margin: 0;
    display: inline-block;
    background: linear-gradient(to right, #07AFC0, #1aa853);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 28px;
}
.card h3 {
    display: inline-block;
    background: linear-gradient(to right, #07AFC0, #1aa853);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 32px;
}
    
.row {
    margin-top: 40px;
}

.label {
    font-size: 16px;
    display: inline-block;
    width: 70%;
}

.value {
    font-size: 16px;
    font-weight: bold;
}

.line {
    width: 100%;
    border-bottom: 1px solid #ddd;
    margin-top: 5px;
}

.view-btn {
    margin-top: 12px;
    background: linear-gradient(to right, #07AFC0, #1aa853);
    border: none;
    color: white;
    padding: 6px 25px;
    border-radius: 5px;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
}

.view-btn:hover {
    background: linear-gradient(to right,#1aa853, #07AFC0);
}

 .sidebar { 
    width: 230px; 
    height: 100vh; 
    position: fixed; 
    left: 0; 
    top: 0; 
    background: #26bfa3; 
    padding-top: 20px; 
    z-index: 100; 
}

.ptimg { 
    margin: 0 auto 30px auto; 
    width: 180px; 
    height: 80px;
    background: #ffffff; 
    border-radius: 15px; 
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.ptimg img { 
    width: 150px; 
}

.sidebar a { 
    display: block; 
    padding: 12px 25px; 
    text-decoration: none; 
    color: white; 
    font-size: 16px; 
    transition: 0.3s;
    font-weight: 500;
}

.sidebar a:hover { 
    background: rgba(255, 255, 255, 0.2);
    padding-left: 35px; 
}

.sidebar button { 
    display: block; 
    width: 80%; 
    padding: 12px; 
    margin: 40px auto; 
    background: white; 
    color: #26bfa3; 
    font-weight: bold; 
    border-radius: 10px; 
    border: none; 
    cursor: pointer; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}


.wave-track {
  position: absolute;
  bottom: 7%;
  display: flex;
  width: 200%;
  animation: waveMove 35s linear infinite;
}

.wave {
  width: 100%;
  height: auto;
  flex-shrink: 0;
}


@keyframes waveMove {
  0% {
    transform: translateX(0);
  }
  100% {
    transform: translateX(-50%);
  }
}


</style>
</head>
<body>
<div class="wave-container">
  <div class="wave-track">
    <img src="Software.png" class="wave">
    <img src="Software.png" class="wave">
  </div>
</div>
<div class="sidebar">
    <div class="ptimg"><img src="PTlogo.png" alt=""></div> 
   
    <a href="home.html">Home</a>
    <a href="employees.html">Employees</a>
    <a href="attendance.html">Attendance</a>
    <a href="stock.html">Stock</a>
    <a href="cust.html">Customers</a>
    <a href="accounts.html">Accounts</a>
    <a href="expenses.html">Expenses</a>
    <a href="customer_data.html">Customer Data</a><br><br><br><br>
    <button onclick="logout()">Logout</button>
</div>

<div id="home" class="content active">
    <div class="home-box">
        <div class="card">
    <h2>Hi,</h2><br>
    <h3 id="empUserDisplay"></h3>
        <div class="row">
            <span class="label">Employees Logged In</span>
            <span class="value" id="empCount">00</span>
            <div class="line"></div><br>
            <a class="view-btn" href="attendance.html">View</a>
            
        </div>

        <div class="row">
            <span class="label">Stocks Required</span>
            <span class="value" id="urgentStockCount">00</span>
            <div class="line"></div><br>
            <a class="view-btn" href="stock.html">View</a>
        </div>

        <div class="row">
            <span class="label">Pending Customers</span>
            <span class="value" id="pendingCustomerCount">00</span>
            <div class="line"></div><br>
            <a class="view-btn" href="cust.html">View</a>
        </div>
    </div>
</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC3yLs6Zx_JuCtGIPVKSrY9gse3ZkAi3Fs",
    authDomain: "printech-c101a.firebaseapp.com",
    projectId: "printech-c101a",
    storageBucket: "printech-c101a.firebasestorage.app",
    messagingSenderId: "629188473697",
    appId: "1:629188473697:web:1ca8e7a5294eb9ec830b20"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  document.addEventListener("DOMContentLoaded", () => {
    const logged = JSON.parse(sessionStorage.getItem("loggedUser"));
    if (!logged) {
        window.location.href = "login.html";
        return;
    }
    document.getElementById("empUserDisplay").innerText = logged.user || logged.name;

    if (logged.role !== "Founder") {
        
        const restricted = ["employees.html"];
        restricted.forEach(page => {
            const link = document.querySelector(`a[href="${page}"]`);
            if (link) link.style.display = 'none';
        });
    }

onSnapshot(collection(db, "AttendanceRecords"), (snap) => {
    let presentStaffs = new Set();
    const now = new Date();
    const offset = now.getTimezoneOffset();
    const adjustedDate = new Date(now.getTime() - (offset * 60 * 1000));
    const todayStr = adjustedDate.toISOString().split('T')[0]; 

    console.log("Checking for date:", todayStr); 

    snap.forEach(doc => {
        const a = doc.data();
        if(a.date === todayStr && a.status === "IN") {
            presentStaffs.add(a.employeeName);
        }
    });

    const empElem = document.getElementById("empCount");
    if(empElem) {
        empElem.innerText = presentStaffs.size.toString().padStart(2, '0');
        empElem.style.color = presentStaffs.size > 0 ? "#1aa853" : "black";
    }
});
    onSnapshot(query(collection(db, "StockData"), where("status", "==", "Low")), (snap) => {
        document.getElementById("urgentStockCount").innerText = snap.size.toString().padStart(2, '0');
        document.getElementById("urgentStockCount").style.color = snap.size > 0 ? "red" : "black";
    });

    onSnapshot(collection(db, "SoftwareData"), (snap) => {
        let pendingCount = 0;
        snap.forEach(doc => {
            if(doc.data().complete === false) pendingCount++;
        });
        document.getElementById("pendingCustomerCount").innerText = pendingCount.toString().padStart(2, '0');
        document.getElementById("pendingCustomerCount").style.color = pendingCount > 0 ? "red" : "black";
    });
  });

  window.logout = () => {
    
    window.location.href = "login.html";
  };
  
</script>
</body>
</html>
